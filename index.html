<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#5B3FFF" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BelandaKu" />
<meta name="mobile-web-app-capable" content="yes" />
<title>BelandaKu — Belajar Bahasa Belanda</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CclipPath id='c'%3E%3Crect width='100' height='100' rx='22'/%3E%3C/clipPath%3E%3C/defs%3E%3Cg clip-path='url(%23c)'%3E%3Crect width='100' height='34' fill='%23AE1C28'/%3E%3Crect y='34' width='100' height='33' fill='%23FFFFFF'/%3E%3Crect y='67' width='100' height='33' fill='%2321468B'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CclipPath id='c'%3E%3Crect width='100' height='100' rx='22'/%3E%3C/clipPath%3E%3C/defs%3E%3Cg clip-path='url(%23c)'%3E%3Crect width='100' height='34' fill='%23AE1C28'/%3E%3Crect y='34' width='100' height='33' fill='%23FFFFFF'/%3E%3Crect y='67' width='100' height='33' fill='%2321468B'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  /* ============================================================
     BelandaKu — Dutch ↔ Indonesian Quizlet-style learning app
     ============================================================ */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --primary:#5B3FFF;
    --primary-dark:#4129E0;
    --primary-light:#EEEAFF;
    --accent:#FFB800;
    --accent-dark:#E09F00;
    --success:#10B981;
    --success-light:#D1FAE5;
    --danger:#EF4444;
    --danger-light:#FEE2E2;
    --bg:#F7F7FB;
    --surface:#FFFFFF;
    --surface-2:#F0F0F7;
    --text:#0F0F23;
    --text-muted:#6B6B85;
    --border:#E5E5EE;
    --shadow:0 4px 14px rgba(91,63,255,.08);
    --shadow-lg:0 10px 30px rgba(15,15,35,.12);
    --radius:18px;
    --radius-sm:12px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"]{
    --primary:#7C66FF;
    --primary-dark:#5B3FFF;
    --primary-light:#2A2350;
    --bg:#0B0B1F;
    --surface:#16162E;
    --surface-2:#1F1F3D;
    --text:#F0F0FA;
    --text-muted:#9696B8;
    --border:#2A2A48;
    --success-light:#0E3A2E;
    --danger-light:#3A1414;
    --shadow:0 4px 14px rgba(0,0,0,.4);
    --shadow-lg:0 10px 30px rgba(0,0,0,.5);
  }
  html,body{height:100%;overscroll-behavior:none}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--text);
    line-height:1.5;-webkit-font-smoothing:antialiased;
    padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
    overflow-x:hidden;
  }
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;outline:none}
  input,textarea{font:inherit;color:inherit}
  img{max-width:100%;display:block}

  /* App shell */
  #app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:24px}

  /* Top bar */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;position:sticky;top:0;background:var(--bg);z-index:50;
  }
  .topbar h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
  .topbar h1 .accent{color:var(--primary)}
  .flag-badge{
    display:inline-block;width:26px;height:19px;border-radius:4px;flex-shrink:0;
    background:linear-gradient(to bottom,#AE1C28 0%,#AE1C28 33.33%,#FFFFFF 33.33%,#FFFFFF 66.66%,#21468B 66.66%,#21468B 100%);
    box-shadow:0 1px 3px rgba(0,0,0,.15);border:1px solid rgba(0,0,0,.06);
  }
  .flag-badge.flag-id{
    background:linear-gradient(to bottom,#FF0000 0%,#FF0000 50%,#FFFFFF 50%,#FFFFFF 100%);
  }
  .icon-btn{
    width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
    background:var(--surface);box-shadow:var(--shadow);font-size:18px;
    transition:transform .15s;
  }
  .icon-btn:active{transform:scale(.92)}
  .topbar-right{display:flex;gap:8px}

  /* Hero stats */
  .hero{
    margin:6px 18px 18px;padding:18px 20px;border-radius:var(--radius);
    background:linear-gradient(135deg,var(--primary) 0%,#7C66FF 100%);
    color:white;box-shadow:var(--shadow-lg);
    position:relative;overflow:hidden;
  }
  .hero::after{
    content:"";position:absolute;top:-30px;right:-30px;
    width:140px;height:140px;border-radius:50%;
    background:rgba(255,255,255,.08);
  }
  .hero h2{font-size:13px;font-weight:600;opacity:.85;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
  .hero p.title{font-size:22px;font-weight:800;line-height:1.2}
  .hero-stats{display:flex;gap:18px;margin-top:14px;position:relative;z-index:1}
  .hero-stat{font-size:12px;opacity:.92}
  .hero-stat strong{display:block;font-size:22px;font-weight:800;margin-bottom:2px}

  /* Search */
  .search-wrap{margin:0 18px 16px;position:relative}
  .search-wrap input{
    width:100%;padding:14px 16px 14px 46px;border:1.5px solid var(--border);
    border-radius:14px;background:var(--surface);font-size:15px;
  }
  .search-wrap input:focus{border-color:var(--primary)}
  .search-wrap::before{
    content:"🔍";position:absolute;left:16px;top:50%;transform:translateY(-50%);
    font-size:16px;opacity:.6;
  }

  /* Section title */
  .section-title{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;margin:18px 0 10px;font-size:15px;font-weight:700;
  }
  .section-title span.muted{font-weight:500;color:var(--text-muted);font-size:13px}

  /* Deck grid */
  .deck-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px;
  }
  .deck-card{
    background:var(--surface);border-radius:var(--radius);padding:16px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
    transition:transform .15s;text-align:left;display:flex;flex-direction:column;gap:8px;
    min-height:140px;border:1.5px solid transparent;
  }
  .deck-card:active{transform:scale(.97)}
  .deck-icon{
    width:44px;height:44px;border-radius:12px;display:grid;place-items:center;
    font-size:24px;
  }
  .deck-card .deck-title{font-size:14.5px;font-weight:700;line-height:1.25}
  .deck-card .deck-sub{font-size:11.5px;color:var(--text-muted)}
  .deck-card .deck-meta{
    margin-top:auto;display:flex;align-items:center;justify-content:space-between;
    font-size:11px;color:var(--text-muted);font-weight:500;
  }
  .progress-bar{
    height:5px;background:var(--surface-2);border-radius:99px;overflow:hidden;flex:1;margin-right:8px;
  }
  .progress-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .4s}

  /* Deck detail */
  .nav{display:flex;align-items:center;gap:10px;padding:10px 14px}
  .back-btn{
    width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
    background:var(--surface);box-shadow:var(--shadow);font-size:18px;flex-shrink:0;
  }
  .nav-title{font-size:17px;font-weight:700;flex:1;line-height:1.2}
  .nav-sub{font-size:12px;color:var(--text-muted);font-weight:500}

  .deck-header{
    margin:6px 18px 18px;padding:22px 22px;border-radius:var(--radius);
    color:white;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;
  }
  .deck-header::after{
    content:"";position:absolute;top:-40px;right:-40px;
    width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.1);
  }
  .deck-header h2{font-size:24px;font-weight:800;margin-bottom:4px;position:relative}
  .deck-header p{font-size:14px;opacity:.92;position:relative}
  .deck-header-stats{
    display:flex;gap:14px;margin-top:14px;position:relative;
  }
  .chip{
    background:rgba(255,255,255,.18);padding:5px 11px;border-radius:99px;
    font-size:12px;font-weight:600;backdrop-filter:blur(10px);
  }

  /* Mode list */
  .modes{padding:0 18px;display:flex;flex-direction:column;gap:10px}
  .mode-card{
    background:var(--surface);border-radius:var(--radius);padding:16px 18px;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
    text-align:left;transition:transform .15s;
  }
  .mode-card:active{transform:scale(.98)}
  .mode-icon{
    width:48px;height:48px;border-radius:14px;display:grid;place-items:center;
    font-size:24px;background:var(--primary-light);flex-shrink:0;
  }
  .mode-info{flex:1}
  .mode-info h3{font-size:16px;font-weight:700;margin-bottom:2px}
  .mode-info p{font-size:12.5px;color:var(--text-muted)}
  .mode-arrow{color:var(--text-muted);font-size:18px;font-weight:700}

  /* Cards list (in deck detail) */
  .cards-list{padding:0 18px;display:flex;flex-direction:column;gap:8px}
  .card-row{
    background:var(--surface);border-radius:var(--radius-sm);padding:12px 14px;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;
  }
  .card-row .term{font-weight:700;font-size:14.5px}
  .card-row .def{font-size:13px;color:var(--text-muted);margin-top:2px}
  .star-btn{font-size:18px;background:none;line-height:1;flex-shrink:0;opacity:.4;transition:opacity .2s}
  .star-btn.active{opacity:1}

  /* Flashcards */
  .mode-screen{padding:0 18px;display:flex;flex-direction:column;min-height:calc(100vh - 60px)}
  .topbar-mode{
    display:flex;align-items:center;gap:10px;padding:10px 4px 16px;
  }
  .topbar-mode .progress-bar{height:7px;flex:1}
  .progress-text{font-size:13px;font-weight:600;color:var(--text-muted);min-width:46px;text-align:right}

  .fc-stage{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 0 12px;perspective:1500px;min-height:340px;
  }
  .fc-card{
    width:100%;max-width:430px;aspect-ratio:3/4;max-height:480px;
    position:relative;cursor:pointer;
    transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1);
  }
  .fc-card.flipped{transform:rotateY(180deg)}
  .fc-face{
    position:absolute;inset:0;border-radius:24px;
    background:var(--surface);box-shadow:var(--shadow-lg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 22px;backface-visibility:hidden;text-align:center;
    border:2px solid var(--border);
  }
  .fc-face.back{transform:rotateY(180deg);background:linear-gradient(135deg,#FFF7E5,#FFEFC2);border-color:var(--accent)}
  [data-theme="dark"] .fc-face.back{background:linear-gradient(135deg,#3A2F0E,#5A4A1E);border-color:var(--accent-dark)}
  .fc-face .lang-tag{
    position:absolute;top:18px;left:18px;font-size:10.5px;font-weight:700;letter-spacing:.7px;
    text-transform:uppercase;color:var(--text-muted);background:var(--surface-2);
    padding:4px 9px;border-radius:99px;
  }
  .fc-speak{
    position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;
    background:var(--surface-2);display:grid;place-items:center;font-size:16px;
  }
  .fc-text{font-size:30px;font-weight:800;line-height:1.2;word-break:break-word}
  .fc-example{margin-top:18px;font-size:14px;color:var(--text-muted);font-style:italic;line-height:1.4}
  .fc-hint{position:absolute;bottom:18px;font-size:11px;color:var(--text-muted);font-weight:500}

  .fc-controls{display:flex;gap:10px;margin-top:16px}
  .fc-btn{
    flex:1;padding:14px;border-radius:14px;font-weight:700;font-size:15px;
    display:flex;align-items:center;justify-content:center;gap:6px;
    transition:transform .1s;
  }
  .fc-btn:active{transform:scale(.97)}
  .fc-btn.no{background:var(--danger-light);color:var(--danger)}
  .fc-btn.yes{background:var(--success-light);color:var(--success)}
  .fc-btn.skip{background:var(--surface);color:var(--text-muted);box-shadow:var(--shadow);flex:0 0 56px}

  .fc-card.swipe-yes{transform:translateX(40%) rotate(8deg);opacity:0;transition:transform .35s,opacity .35s}
  .fc-card.swipe-no{transform:translateX(-40%) rotate(-8deg);opacity:0;transition:transform .35s,opacity .35s}
  .fc-card.swipe-yes.flipped{transform:translateX(40%) rotate(8deg) rotateY(180deg);opacity:0}
  .fc-card.swipe-no.flipped{transform:translateX(-40%) rotate(-8deg) rotateY(180deg);opacity:0}

  /* Learn mode */
  .learn-prompt{
    background:var(--surface);border-radius:var(--radius);padding:32px 22px;
    box-shadow:var(--shadow);text-align:center;margin-bottom:20px;
  }
  .learn-prompt .small{font-size:12px;color:var(--text-muted);margin-bottom:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .learn-prompt .word{font-size:30px;font-weight:800;line-height:1.2;word-break:break-word}
  .learn-prompt .speak-btn{margin:14px auto 0;width:42px;height:42px;border-radius:50%;background:var(--primary-light);display:grid;place-items:center;font-size:18px}
  .learn-options{display:flex;flex-direction:column;gap:10px}
  .learn-option{
    background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
    padding:14px 18px;font-size:15.5px;font-weight:600;text-align:left;
    transition:all .15s;display:flex;align-items:center;gap:10px;
  }
  .learn-option:active{transform:scale(.98)}
  .learn-option .num{
    width:26px;height:26px;border-radius:50%;background:var(--surface-2);
    display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0;
  }
  .learn-option.correct{background:var(--success-light);border-color:var(--success);color:var(--success)}
  .learn-option.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}
  .learn-option.correct .num,.learn-option.wrong .num{background:transparent}
  .learn-typing input{
    width:100%;padding:16px;border:2px solid var(--border);border-radius:14px;
    background:var(--surface);font-size:18px;font-weight:600;
  }
  .learn-typing input:focus{border-color:var(--primary)}
  .learn-typing.correct input{border-color:var(--success);background:var(--success-light);color:var(--success)}
  .learn-typing.wrong input{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
  .learn-feedback{
    margin-top:14px;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;
    display:none;
  }
  .learn-feedback.show{display:block}
  .learn-feedback.correct{background:var(--success-light);color:var(--success)}
  .learn-feedback.wrong{background:var(--danger-light);color:var(--danger)}
  .primary-btn{
    width:100%;padding:16px;border-radius:14px;background:var(--primary);color:white;
    font-weight:700;font-size:15.5px;margin-top:14px;transition:transform .1s;
  }
  .primary-btn:active{transform:scale(.98)}
  .primary-btn:disabled{opacity:.5}
  .ghost-btn{
    width:100%;padding:14px;border-radius:14px;background:var(--surface);color:var(--text);
    font-weight:600;font-size:14.5px;margin-top:8px;box-shadow:var(--shadow);
  }

  /* Match mode */
  .match-bar{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
    background:var(--surface);padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);
  }
  .match-bar .timer{font-size:18px;font-weight:800;color:var(--primary)}
  .match-bar .label{font-size:11.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .match-grid{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  }
  .match-tile{
    background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
    padding:14px 8px;font-size:13px;font-weight:600;text-align:center;line-height:1.2;
    min-height:78px;display:grid;place-items:center;cursor:pointer;
    transition:all .15s;word-break:break-word;
  }
  .match-tile:active{transform:scale(.95)}
  .match-tile.selected{background:var(--primary);color:white;border-color:var(--primary)}
  .match-tile.matched{background:var(--success-light);border-color:var(--success);color:var(--success);opacity:.5;pointer-events:none}
  .match-tile.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger);animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  /* Test mode */
  .test-q{
    background:var(--surface);border-radius:var(--radius);padding:22px;
    box-shadow:var(--shadow);margin-bottom:14px;
  }
  .test-q-num{font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
  .test-q-prompt{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:14px}
  .test-results{
    background:var(--surface);border-radius:var(--radius);padding:30px 22px;text-align:center;
    box-shadow:var(--shadow-lg);margin-bottom:18px;
  }
  .test-results .score{font-size:60px;font-weight:800;line-height:1;color:var(--primary)}
  .test-results .out-of{font-size:18px;color:var(--text-muted);font-weight:600;margin-top:4px}
  .test-results .summary{font-size:14px;margin-top:14px}
  .review-item{
    background:var(--surface);padding:14px;border-radius:var(--radius-sm);
    box-shadow:var(--shadow);margin-bottom:8px;border-left:4px solid var(--danger);
  }
  .review-item .q{font-size:13px;color:var(--text-muted);margin-bottom:4px}
  .review-item .a{font-size:14.5px;font-weight:600}
  .review-item .a strike{color:var(--danger);text-decoration:line-through;margin-right:8px}
  .review-item .a .right{color:var(--success);font-weight:700}

  /* Toast / done overlay */
  .done-screen{
    text-align:center;padding:40px 22px;
  }
  .done-screen .emoji{font-size:80px;margin-bottom:14px}
  .done-screen h2{font-size:26px;font-weight:800;margin-bottom:6px}
  .done-screen p{font-size:15px;color:var(--text-muted);margin-bottom:22px}
  .done-actions{display:flex;flex-direction:column;gap:10px;max-width:300px;margin:0 auto}

  /* Settings drawer */
  .drawer-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .drawer-overlay.show{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;left:0;right:0;bottom:0;background:var(--surface);
    border-radius:24px 24px 0 0;padding:18px 22px 28px;z-index:101;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.4,.2,.2,1);
    max-width:520px;margin:0 auto;
  }
  .drawer.show{transform:translateY(0)}
  .drawer-handle{width:42px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
  .drawer h3{font-size:18px;font-weight:800;margin-bottom:14px}
  .setting-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 0;border-bottom:1px solid var(--border);
  }
  .setting-row:last-child{border-bottom:none}
  .setting-row .label{font-size:14.5px;font-weight:600}
  .setting-row .desc{font-size:12px;color:var(--text-muted);margin-top:2px}
  .toggle{
    width:46px;height:26px;background:var(--surface-2);border-radius:99px;
    position:relative;transition:background .2s;flex-shrink:0;
  }
  .toggle::after{
    content:"";position:absolute;width:20px;height:20px;background:white;
    border-radius:50%;top:3px;left:3px;transition:transform .2s;
    box-shadow:0 1px 4px rgba(0,0,0,.2);
  }
  .toggle.on{background:var(--primary)}
  .toggle.on::after{transform:translateX(20px)}

  /* utility */
  .hidden{display:none!important}
  .empty{
    text-align:center;padding:50px 20px;color:var(--text-muted);
  }
  .empty .emoji{font-size:50px;margin-bottom:12px}

  /* Animations */
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .25s ease-out}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

  @media (max-width: 360px){
    .deck-card .deck-title{font-size:13.5px}
    .fc-text{font-size:26px}
  }
</style>
</head>
<body>
<div id="app"></div>

/* =========================================================
   STATE & PERSISTENCE
   ========================================================= */
const STORAGE_KEY = "belandaku_v1";
const SETTINGS_KEY = "belandaku_settings_v1";

function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }
  catch(e){ return {}; }
}
function saveProgress(p){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }catch(e){}
}
function loadSettings(){
  try{ return Object.assign({direction:"nl-id",dark:false,shuffle:true},JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}")); }
  catch(e){ return {direction:"nl-id",dark:false,shuffle:true}; }
}
function saveSettings(s){
  try{ localStorage.setItem(SETTINGS_KEY,JSON.stringify(s)); }catch(e){}
}

let progress = loadProgress();   // { deckId: { learned:[ids], starred:[ids], best:{matchSec:n,testScore:n} } }
let settings = loadSettings();

function getDeckProgress(deckId){
  if(!progress[deckId]) progress[deckId] = { learned:[], starred:[], best:{} };
  return progress[deckId];
}
function isLearned(deckId, cardId){ return getDeckProgress(deckId).learned.includes(cardId); }
function markLearned(deckId, cardId, val=true){
  const p = getDeckProgress(deckId);
  const idx = p.learned.indexOf(cardId);
  if(val && idx<0) p.learned.push(cardId);
  if(!val && idx>=0) p.learned.splice(idx,1);
  saveProgress(progress);
}
function isStarred(deckId, cardId){ return getDeckProgress(deckId).starred.includes(cardId); }
function toggleStarred(deckId, cardId){
  const p = getDeckProgress(deckId);
  const idx = p.starred.indexOf(cardId);
  if(idx<0) p.starred.push(cardId); else p.starred.splice(idx,1);
  saveProgress(progress);
}

function applyTheme(){
  document.documentElement.dataset.theme = settings.dark ? "dark" : "light";
}
applyTheme();

   ROUTING / SCREENS
   ========================================================= */
const app = document.getElementById("app");
let currentScreen = {name:"home"};

function go(screen){
  currentScreen = screen;
  render();
  window.scrollTo({top:0,behavior:"instant"});
}

window.addEventListener("popstate",e=>{
  if(currentScreen.name!=="home") go({name:"home"});
});

/* Helpers */
function shuffle(arr){
  arr = arr.slice();
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function normalize(s){
  return String(s).toLowerCase()
    .replace(/[‘’']/g,"'")
    .replace(/[.,!?;:()"]/g,"")
    .replace(/\s+/g," ")
    .replace(/\bhet\b|\bde\b|\been\b/g,"")  // forgive missing articles
    .trim();
}
function answersMatch(user, target){
  user = normalize(user); target = normalize(target);
  if(!user) return false;
  if(user===target) return true;
  // also accept the first variant if target has " / " or " — "
  for(const v of target.split(/\s*[\/—\-]\s*/)){
    if(normalize(v)===user) return true;
  }
  return false;
}

function speak(text){
  if(!("speechSynthesis" in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "nl-NL";
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

  if(currentScreen.name==="home") renderHome();
  else if(currentScreen.name==="deck") renderDeck();
  else if(currentScreen.name==="flashcards") renderFlashcards();
  else if(currentScreen.name==="learn") renderLearn();
  else if(currentScreen.name==="match") renderMatch();
  else if(currentScreen.name==="write") renderWrite();
  else if(currentScreen.name==="test") renderTest();
}

    currentScreen.flipped = false;
    currentScreen.gotIt = 0;
    currentScreen.notYet = 0;
  }

  const total = currentScreen.cards.length;
  const i = currentScreen.idx;

  if(i >= total){
    // done screen

            <button class="fc-speak" id="speakFront">🔊</button>

            <div class="fc-hint">Tap untuk membalik</div>
          </div>
          <div class="fc-face back">
            <div class="lang-tag">${backLang}</div>
            <button class="fc-speak" id="speakBack">🔊</button>
            <div class="fc-text">${escHtml(back)}</div>
            ${card.ex && dir==="id-nl" ? `<div class="fc-example">${escHtml(card.ex)}</div>`:""}

    currentScreen.flipped = !currentScreen.flipped;
    fc.classList.toggle("flipped");

  document.getElementById("speakFront").addEventListener("click",e=>{
    e.stopPropagation();
    speak(dir==="nl-id" ? card.dutch : card.indo);
  });
  document.getElementById("speakBack").addEventListener("click",e=>{
    e.stopPropagation();
    speak(dir==="id-nl" ? card.dutch : card.indo);
  });

  function advance(known){
    if(known){
      markLearned(deck.id, card.id, true);
      currentScreen.gotIt++;
      fc.classList.add("swipe-yes");
    } else {
      currentScreen.notYet++;
      fc.classList.add("swipe-no");
    }
    setTimeout(()=>{
      currentScreen.idx++;
      currentScreen.flipped = false;
      render();
    }, 320);
  }

  document.getElementById("yesBtn").addEventListener("click",()=>advance(true));
  document.getElementById("noBtn").addEventListener("click",()=>advance(false));
  document.getElementById("starBtn").addEventListener("click",()=>{
    toggleStarred(deck.id, card.id);
    render();
  });
  document.getElementById("backBtn").addEventListener("click",()=>{
    currentScreen.cards = null;
    go({name:"deck", deckId:deck.id});
  });
  document.getElementById("dirBtn").addEventListener("click",()=>{
    settings.direction = settings.direction==="nl-id" ? "id-nl" : "nl-id";
    saveSettings(settings);
    render();
  });

  // Touch swipe
  let startX=0, startY=0, dragging=false;
  fc.addEventListener("touchstart",e=>{
    if(e.touches.length!==1) return;
    startX = e.touches[0].clientX; startY=e.touches[0].clientY; dragging=true;
  },{passive:true});
  fc.addEventListener("touchmove",e=>{
    if(!dragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if(Math.abs(dx) > 16 && Math.abs(dx) > Math.abs(dy)){
      fc.style.transform = `${currentScreen.flipped?"rotateY(180deg) ":""}translateX(${dx}px) rotate(${dx*0.04}deg)`;
    }
  },{passive:true});
  fc.addEventListener("touchend",e=>{
    if(!dragging) return;
    dragging=false;
    const endX = e.changedTouches[0].clientX;
    const dx = endX - startX;
    fc.style.transform = "";
    if(Math.abs(dx) > 80){
      advance(dx > 0); // right=know it
    }
  });
}

/* ----- LEARN MODE (adaptive MC + typing) ----- */
function renderLearn(){
  const deck = DECKS.find(d=>d.id===currentScreen.deckId);
  if(!deck) return go({name:"home"});

  if(!currentScreen.queue){
    // build queue: each card needs 2 correct in a row to graduate
    currentScreen.queue = shuffle(deck.cards).map(c=>({card:c, streak:0, mode:"mc"}));
    currentScreen.total = deck.cards.length;
    currentScreen.done = 0;
    currentScreen.locked = false;
  }

  if(currentScreen.queue.length===0){
    app.innerHTML = `
      <div class="nav">
        <button class="back-btn" onclick="currentScreen={};go({name:'deck',deckId:'${deck.id}'})">←</button>
        <div class="nav-title">Selesai!</div>
      </div>
      <div class="done-screen">
        <div class="emoji">🏆</div>
        <h2>Hebat!</h2>
        <p>Semua ${currentScreen.total} kartu sudah dikuasai</p>
        <div class="done-actions">
          <button class="primary-btn" onclick="currentScreen={name:'learn',deckId:'${deck.id}'};render()">Mulai lagi</button>
          <button class="ghost-btn" onclick="currentScreen={};go({name:'deck',deckId:'${deck.id}'})">Kembali</button>
        </div>
      </div>
    `;
    return;
  }

  const item = currentScreen.queue[0];
  const card = item.card;
  const dir = settings.direction;
  const prompt = dir==="nl-id" ? card.dutch : card.indo;
  const target = dir==="nl-id" ? card.indo : card.dutch;
  const promptLang = dir==="nl-id" ? "🇳🇱 Belanda" : "🇮🇩 Indonesia";
  const targetLang = dir==="nl-id" ? "Indonesia" : "Belanda";
  const progressPct = (currentScreen.done / currentScreen.total) * 100;

  let optionsHtml = "";
  if(item.mode === "mc"){
    // pick 3 random distractors from same deck
    const others = shuffle(deck.cards.filter(c=>c.id!==card.id)).slice(0,3);
    const opts = shuffle([card, ...others]);
    item._opts = opts; // remember for grading
    optionsHtml = `
      <div class="learn-options">
        ${opts.map((c,n)=>{
          const txt = dir==="nl-id" ? c.indo : c.dutch;
          return `<button class="learn-option" data-cid="${c.id}"><span class="num">${n+1}</span><span>${escHtml(txt)}</span></button>`;
        }).join("")}
      </div>`;
  } else {
    optionsHtml = `
      <div class="learn-typing">
        <input id="typeInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Ketik terjemahan dalam ${targetLang}..." />
        <div class="learn-feedback" id="feedback"></div>
        <button class="primary-btn" id="checkBtn">Periksa</button>
      </div>`;
  }

  app.innerHTML = `
    <div class="nav">
      <button class="back-btn" id="backBtn">←</button>
      <div class="nav-title">${escHtml(deck.title)} · Belajar</div>
    </div>

    <div class="mode-screen">
      <div class="topbar-mode">
        <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
        <div class="progress-text">${currentScreen.done}/${currentScreen.total}</div>
      </div>

      <div class="learn-prompt">
        <div class="small">${promptLang}${item.mode==="type"?" · ketik jawaban":""}</div>
        <div class="word">${escHtml(prompt)}</div>
        <button class="speak-btn" id="speakBtn" aria-label="Speak">🔊</button>
      </div>

      ${optionsHtml}
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click",()=>{
    currentScreen.queue = null;
    go({name:"deck", deckId:deck.id});
  });
  document.getElementById("speakBtn").addEventListener("click",()=>speak(card.dutch));

  if(item.mode === "mc"){
    document.querySelectorAll(".learn-option").forEach(el=>{
      el.addEventListener("click",()=>{
        if(currentScreen.locked) return;
        currentScreen.locked = true;
        const correct = el.dataset.cid === card.id;
        document.querySelectorAll(".learn-option").forEach(x=>{
          if(x.dataset.cid === card.id) x.classList.add("correct");
          else if(x===el && !correct) x.classList.add("wrong");
        });
        finishItem(correct);
      });
    });
  } else {
    const input = document.getElementById("typeInput");
    const fb = document.getElementById("feedback");
    const wrap = input.parentElement;
    const check = ()=>{
      if(currentScreen.locked) return;
      const v = input.value;
      const correct = answersMatch(v, target);
      currentScreen.locked = true;
      if(correct){
        wrap.classList.add("correct");
        fb.textContent = "Bagus! ✓";
        fb.className = "learn-feedback correct show";
      } else {
        wrap.classList.add("wrong");
        fb.innerHTML = `Jawaban benar: <strong>${escHtml(target)}</strong>`;
        fb.className = "learn-feedback wrong show";
      }
      finishItem(correct);
    };
    document.getElementById("checkBtn").addEventListener("click",check);
    input.addEventListener("keydown",e=>{ if(e.key==="Enter") check(); });
    setTimeout(()=>input.focus(),100);
  }
}
function finishItem(correct){
  setTimeout(()=>{
    const item = currentScreen.queue.shift();
    if(correct){
      item.streak++;
      if(item.streak >= 2){
        // graduated
        markLearned(currentScreen.deckId, item.card.id, true);
        currentScreen.done++;
      } else {
        // upgrade to typing after first MC correct
        item.mode = "type";
        // requeue further back
        const insertAt = Math.min(currentScreen.queue.length, 3 + Math.floor(Math.random()*4));
        currentScreen.queue.splice(insertAt, 0, item);
      }
    } else {
      item.streak = 0;
      item.mode = "mc"; // back to easier
      const insertAt = Math.min(currentScreen.queue.length, 2 + Math.floor(Math.random()*3));
      currentScreen.queue.splice(insertAt, 0, item);
    }
    currentScreen.locked = false;
    render();
  }, correct ? 700 : 1700);
}

/* ----- MATCH MODE ----- */
function renderMatch(){
  const deck = DECKS.find(d=>d.id===currentScreen.deckId);
  if(!deck) return go({name:"home"});

  if(!currentScreen.tiles){
    const pool = shuffle(deck.cards).slice(0, Math.min(6, deck.cards.length));
    const tiles = [];
    pool.forEach((c,i)=>{
      tiles.push({id:`d${i}`, cid:c.id, text:c.dutch, side:"d"});
      tiles.push({id:`i${i}`, cid:c.id, text:c.indo, side:"i"});
    });
    currentScreen.tiles = shuffle(tiles);
    currentScreen.matched = [];
    currentScreen.selected = [];
    currentScreen.start = Date.now();
    currentScreen.locked = false;
    if(currentScreen.timerInt) clearInterval(currentScreen.timerInt);
    currentScreen.timerInt = setInterval(()=>{
      const el = document.getElementById("timer");
      if(el) el.textContent = ((Date.now()-currentScreen.start)/1000).toFixed(1)+"s";
    }, 100);
  }

  const total = currentScreen.tiles.length;
  const allMatched = currentScreen.matched.length === total;

  if(allMatched){
    clearInterval(currentScreen.timerInt);
    const elapsed = ((Date.now()-currentScreen.start)/1000).toFixed(1);
    const elapsedNum = parseFloat(elapsed);
    const p = getDeckProgress(deck.id);
    if(!p.best.matchSec || elapsedNum < p.best.matchSec){
      p.best.matchSec = elapsedNum;
      saveProgress(progress);
    }
    app.innerHTML = `
      <div class="nav">
        <button class="back-btn" onclick="currentScreen={};go({name:'deck',deckId:'${deck.id}'})">←</button>
        <div class="nav-title">Cocokkan</div>
      </div>
      <div class="done-screen">
        <div class="emoji">⚡</div>
        <h2>${elapsed} detik</h2>
        <p>${p.best.matchSec===elapsedNum?"Rekor baru! 🏆":`Best: ${p.best.matchSec}s`}</p>
        <div class="done-actions">
          <button class="primary-btn" onclick="currentScreen={name:'match',deckId:'${deck.id}'};render()">Main lagi</button>
          <button class="ghost-btn" onclick="currentScreen={};go({name:'deck',deckId:'${deck.id}'})">Kembali</button>
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="nav">
      <button class="back-btn" id="backBtn">←</button>
      <div class="nav-title">${escHtml(deck.title)} · Cocokkan</div>
    </div>

    <div class="mode-screen">
      <div class="match-bar">
        <div><div class="label">Waktu</div><div class="timer" id="timer">0.0s</div></div>
        <div style="text-align:right"><div class="label">Cocok</div><div class="timer">${currentScreen.matched.length/2}/${total/2}</div></div>
      </div>

      <div class="match-grid">
        ${currentScreen.tiles.map(t=>{
          const matched = currentScreen.matched.includes(t.id);
          const selected = currentScreen.selected.includes(t.id);
          const wrong = currentScreen.wrong && currentScreen.wrong.includes(t.id);
          return `<button class="match-tile ${matched?"matched":""} ${selected?"selected":""} ${wrong?"wrong":""}" data-tile="${t.id}">${escHtml(t.text)}</button>`;
        }).join("")}
      </div>
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click",()=>{
    clearInterval(currentScreen.timerInt);
    currentScreen.tiles = null;
    go({name:"deck", deckId:deck.id});
  });

  document.querySelectorAll(".match-tile").forEach(el=>{
    el.addEventListener("click",()=>{
      if(currentScreen.locked) return;
      const tid = el.dataset.tile;
      if(currentScreen.matched.includes(tid)) return;
      if(currentScreen.selected.includes(tid)){
        // deselect
        currentScreen.selected = currentScreen.selected.filter(x=>x!==tid);
        return render();
      }
      currentScreen.selected.push(tid);
      if(currentScreen.selected.length===2){
        const [aId,bId] = currentScreen.selected;
        const a = currentScreen.tiles.find(t=>t.id===aId);
        const b = currentScreen.tiles.find(t=>t.id===bId);
        if(a.cid===b.cid && a.side!==b.side){
          currentScreen.matched.push(aId,bId);
          currentScreen.selected = [];
          render();
        } else {
          currentScreen.locked = true;
          currentScreen.wrong = [aId,bId];
          render();
          setTimeout(()=>{
            currentScreen.selected = [];
            currentScreen.wrong = null;
            currentScreen.locked = false;
            render();
          }, 600);
        }
      } else {
        render();
      }
    });
  });
}

      fb.className = "learn-feedback wrong show";
      currentScreen.wrong++;
      checkBtn.textContent = "Lanjut →";

  }
  checkBtn.addEventListener("click",check);

/* ----- TEST MODE ----- */
function renderTest(){
  const deck = DECKS.find(d=>d.id===currentScreen.deckId);
  if(!deck) return go({name:"home"});

  if(!currentScreen.questions){
    const N = Math.min(10, deck.cards.length);
    const sample = shuffle(deck.cards).slice(0, N);
    const types = ["mc","tf","write"];
    currentScreen.questions = sample.map(c=>{
      const t = types[Math.floor(Math.random()*types.length)];
      return {card:c, type:t, answered:false, correct:false, userAnswer:""};
    });
    currentScreen.qIdx = 0;
  }

  const qIdx = currentScreen.qIdx;
  const total = currentScreen.questions.length;

  if(qIdx >= total){
    // results
    const right = currentScreen.questions.filter(q=>q.correct).length;
    const wrong = currentScreen.questions.filter(q=>!q.correct);
    const p = getDeckProgress(deck.id);
    if(!p.best.testScore || right > p.best.testScore){
      p.best.testScore = right;
      saveProgress(progress);
    }
    const dir = settings.direction;
    app.innerHTML = `
      <div class="nav"><button class="back-btn" onclick="currentScreen={};go({name:'deck',deckId:'${deck.id}'})">←</button><div class="nav-title">Hasil tes</div></div>
      <div class="mode-screen">
        <div class="test-results">
          <div class="score">${right}</div>
          <div class="out-of">/ ${total}</div>
          <div class="summary">${right===total?"Sempurna! 🏆":right>=total*0.8?"Bagus sekali! 🎉":right>=total*0.5?"Lumayan, terus latihan 💪":"Perlu lebih banyak latihan 📚"}</div>
        </div>
        ${wrong.length?`<div class="section-title" style="padding:0;margin:12px 0 8px"><span>Untuk dipelajari</span></div>`:""}
        ${wrong.map(q=>{
          const prompt = dir==="nl-id"?q.card.dutch:q.card.indo;
          const target = dir==="nl-id"?q.card.indo:q.card.dutch;
          return `<div class="review-item">
            <div class="q">${escHtml(prompt)}</div>
            <div class="a">${q.userAnswer?`<strike>${escHtml(q.userAnswer)}</strike>`:""}<span class="right">${escHtml(target)}</span></div>
          </div>`;
        }).join("")}
        <div class="done-actions" style="margin-top:18px">
          <button class="primary-btn" onclick="currentScreen={name:'test',deckId:'${deck.id}'};render()">Tes lagi</button>
          <button class="ghost-btn" onclick="currentScreen={};go({name:'deck',deckId:'${deck.id}'})">Kembali</button>
        </div>
      </div>
    `;
    return;
  }

  const q = currentScreen.questions[qIdx];
  const card = q.card;
  const dir = settings.direction;
  const prompt = dir==="nl-id" ? card.dutch : card.indo;
  const target = dir==="nl-id" ? card.indo : card.dutch;

  let body = "";
  if(q.type === "mc"){
    const others = shuffle(deck.cards.filter(c=>c.id!==card.id)).slice(0,3);
    const opts = shuffle([card,...others]);
    q._opts = opts;
    body = `
      <div class="learn-options">
        ${opts.map((c,n)=>{
          const txt = dir==="nl-id" ? c.indo : c.dutch;
          return `<button class="learn-option" data-cid="${c.id}"><span class="num">${n+1}</span><span>${escHtml(txt)}</span></button>`;
        }).join("")}
      </div>
    `;
  } else if(q.type === "tf"){
    const isTrueAnswer = Math.random() < 0.5;
    let shown;
    if(isTrueAnswer){
      shown = target;
    } else {
      const other = shuffle(deck.cards.filter(c=>c.id!==card.id))[0];
      shown = dir==="nl-id" ? other.indo : other.dutch;
    }
    q._tfTrue = isTrueAnswer;
    q._tfShown = shown;
    body = `
      <div style="background:var(--surface);padding:18px;border-radius:14px;text-align:center;font-size:18px;font-weight:700;margin-bottom:14px;box-shadow:var(--shadow)">
        ${escHtml(shown)}
      </div>
      <div style="display:flex;gap:10px">
        <button class="fc-btn no" data-tf="false" style="flex:1">✗ Salah</button>
        <button class="fc-btn yes" data-tf="true" style="flex:1">✓ Benar</button>
      </div>
    `;
  } else {
    body = `
      <div class="learn-typing">
        <input id="typeInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Ketik jawaban..." />
        <button class="primary-btn" id="checkBtn">Kirim jawaban</button>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="nav">
      <button class="back-btn" id="backBtn">←</button>
      <div class="nav-title">${escHtml(deck.title)} · Tes</div>
    </div>
    <div class="mode-screen">
      <div class="topbar-mode">
        <div class="progress-bar"><div class="progress-fill" style="width:${(qIdx/total)*100}%"></div></div>
        <div class="progress-text">${qIdx+1}/${total}</div>
      </div>
      <div class="test-q">
        <div class="test-q-num">Soal ${qIdx+1} · ${q.type==="mc"?"Pilihan ganda":q.type==="tf"?"Benar / Salah":"Tulis"}</div>
        <div class="test-q-prompt">
          ${q.type==="tf"?`Apakah ini terjemahan yang benar untuk: <em>${escHtml(prompt)}</em>?`:`Terjemahkan: <strong>${escHtml(prompt)}</strong>`}
        </div>
        ${body}
      </div>
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click",()=>{
    currentScreen.questions = null;
    go({name:"deck",deckId:deck.id});
  });

  function done(correct, userAnswer){
    q.answered = true;
    q.correct = correct;
    q.userAnswer = userAnswer || "";
    if(correct) markLearned(deck.id, card.id, true);
    setTimeout(()=>{
      currentScreen.qIdx++;
      render();
    }, correct ? 500 : 1100);
  }

  if(q.type==="mc"){
    document.querySelectorAll(".learn-option").forEach(el=>{
      el.addEventListener("click",()=>{
        if(q.answered) return;
        const correct = el.dataset.cid === card.id;
        document.querySelectorAll(".learn-option").forEach(x=>{
          if(x.dataset.cid === card.id) x.classList.add("correct");
          else if(x===el && !correct) x.classList.add("wrong");
        });
        const txt = el.querySelector("span:nth-child(2)").textContent;
        done(correct, txt);
      });
    });
  } else if(q.type==="tf"){
    document.querySelectorAll("[data-tf]").forEach(el=>{
      el.addEventListener("click",()=>{
        if(q.answered) return;
        const choice = el.dataset.tf === "true";
        const correct = choice === q._tfTrue;
        el.style.opacity = "0.6";
        done(correct, choice?"Benar":"Salah");
      });
    });
  } else {
    const input = document.getElementById("typeInput");
    const check = ()=>{
      if(q.answered) return;
      const v = input.value;
      const correct = answersMatch(v, target);
      done(correct, v);
    };
    document.getElementById("checkBtn").addEventListener("click",check);
    input.addEventListener("keydown",e=>{ if(e.key==="Enter") check(); });
    setTimeout(()=>input.focus(),100);
  }
}

/* ----- DRAWER ----- */
function renderDrawer(){
  return `
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="drawer">
      <div class="drawer-handle"></div>
      <h3>Pengaturan</h3>
      <div class="setting-row">
        <div>
          <div class="label">Mode gelap</div>
          <div class="desc">Tampilan gelap untuk malam hari</div>
        </div>
        <button class="toggle ${settings.dark?"on":""}" id="toggleDark"></button>
      </div>
      <div class="setting-row">
        <div>
          <div class="label">Arah belajar</div>
          <div class="desc">Bahasa yang ditampilkan di depan</div>
        </div>
        <button class="ghost-btn" style="width:auto;margin:0;padding:8px 14px;font-size:13px" id="toggleDir">${settings.direction==="nl-id"?"🇳🇱 → 🇮🇩":"🇮🇩 → 🇳🇱"}</button>
      </div>
      <div class="setting-row">
        <div>
          <div class="label">Acak urutan</div>
          <div class="desc">Sajikan kartu dalam urutan acak</div>
        </div>
        <button class="toggle ${settings.shuffle?"on":""}" id="toggleShuffle"></button>
      </div>
      <div class="setting-row" style="border-bottom:none">
        <div>
          <div class="label">Reset progres</div>
          <div class="desc">Hapus semua data hafalan & favorit</div>
        </div>
        <button class="ghost-btn" style="width:auto;margin:0;padding:8px 14px;font-size:13px;color:var(--danger)" id="resetBtn">Reset</button>
      </div>
    </div>
  `;
}
function wireDrawer(){
  const btn = document.getElementById("settingsBtn");
  const drawer = document.getElementById("drawer");
  const overlay = document.getElementById("drawerOverlay");
  if(!btn) return;
  const open = ()=>{ drawer.classList.add("show"); overlay.classList.add("show"); };
  const close = ()=>{ drawer.classList.remove("show"); overlay.classList.remove("show"); };
  btn.addEventListener("click",open);
  overlay.addEventListener("click",close);
  document.getElementById("toggleDark").addEventListener("click",()=>{
    settings.dark = !settings.dark;
    saveSettings(settings); applyTheme(); renderHome();
  });
  document.getElementById("toggleDir").addEventListener("click",()=>{
    settings.direction = settings.direction==="nl-id" ? "id-nl" : "nl-id";
    saveSettings(settings); renderHome();
  });
  document.getElementById("toggleShuffle").addEventListener("click",()=>{
    settings.shuffle = !settings.shuffle;
    saveSettings(settings); renderHome();
  });
  document.getElementById("resetBtn").addEventListener("click",()=>{
    if(confirm("Hapus semua progres? Tindakan ini tidak bisa dibatalkan.")){
      progress = {};
      saveProgress(progress);
      renderHome();
    }
  });
}

/* Init */
render();

// Prevent accidental zoom on iOS
document.addEventListener("gesturestart",e=>e.preventDefault());

// Expose for inline handlers
window.go = go;
window.render = render;
window.currentScreen = currentScreen;
Object.defineProperty(window,"currentScreen",{
  get:()=>currentScreen,
  set:v=>{ currentScreen = v; }
});
</script>
